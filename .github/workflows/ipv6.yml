name: Generate operator IPv6 access prefixes

on:
  push:
    branches:
      - ipv6
    paths-ignore:
      - 'data/ipv6/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-operator-ipv6-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      SOURCE_DIR: ${{ github.workspace }}/.tmp/operator-ipv6-sources
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Download sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$SOURCE_DIR"
          curl_opts=(--fail --silent --show-error --location --retry 3)
          curl "${curl_opts[@]}" 'https://www.ris.ripe.net/dumps/riswhoisdump.IPv6.gz' -o "$SOURCE_DIR/riswhois-ipv6.gz"
          curl "${curl_opts[@]}" 'https://iptoasn.com/data/ip2asn-v6.tsv.gz' -o "$SOURCE_DIR/ip2asn-v6.tsv.gz"
          curl "${curl_opts[@]}" 'https://ftp.apnic.net/apnic/whois/apnic.db.inet6num.gz' -o "$SOURCE_DIR/apnic.db.inet6num.gz"
      - name: Validate sources
        shell: bash
        run: |
          set -euo pipefail
          test $(stat -c '%s' "$SOURCE_DIR/riswhois-ipv6.gz") -gt 1000000
          test $(stat -c '%s' "$SOURCE_DIR/ip2asn-v6.tsv.gz") -gt 100000
          test $(stat -c '%s' "$SOURCE_DIR/apnic.db.inet6num.gz") -gt 1000000
      - name: Test
        run: go test ./...
      - name: Generate operator access prefixes
        shell: bash
        run: |
          go run ./cmd/build6 \
            --ris "$SOURCE_DIR/riswhois-ipv6.gz" \
            --iptoasn "$SOURCE_DIR/ip2asn-v6.tsv.gz" \
            --inet6num "$SOURCE_DIR/apnic.db.inet6num.gz" \
            --operator-config config/operators.json
          test -s data/ipv6/operators/chinatelecom.txt
          test -s data/ipv6/operators/chinamobile.txt
          test -s data/ipv6/operators/chinaunicom.txt
          test -s data/ipv6/manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: operator-ipv6-access-prefixes
          path: data/ipv6/
      - name: Commit generated lists
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A data/ipv6
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: update operator IPv6 access prefixes'
          git push
